<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">XRPASCEND Logo Mark</title>
  <desc id="desc">Circular token logo with an ascending A-arrow symbol.</desc>
  <defs>
    <linearGradient id="bg" x1="140" y1="120" x2="884" y2="904" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0B1020"/>
      <stop offset="50%" stop-color="#1A2C64"/>
      <stop offset="100%" stop-color="#3A1A8E"/>
    </linearGradient>
    <linearGradient id="ink" x1="330" y1="760" x2="694" y2="280" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6EE7FF"/>
