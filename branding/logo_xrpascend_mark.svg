  <circle cx="512" cy="266" r="14" fill="#C4B5FD"/>
  <circle cx="640" cy="674" r="11" fill="#6EE7FF" fill-opacity="0.7"/>
  <circle cx="384" cy="674" r="11" fill="#6EE7FF" fill-opacity="0.7"/>
